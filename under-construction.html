<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon — COOLLOOKS23</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #050505;
    --off-black: #0d0d0d;
    --white: #f2f0eb;
    --gray: #8a8880;
    --light-gray: #c8c5bf;
    --accent: #c9a84c;
    --line: rgba(242,240,235,0.1);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Geometric overlay */
  .geo-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
    opacity: 0.04;
  }
  .geo-bg svg { width: 100%; height: 100%; }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 600px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    letter-spacing: 0.15em;
    line-height: 1;
    margin-bottom: 0.25rem;
  }
  .logo span {
    display: block;
    font-size: 1.2rem;
    letter-spacing: 0.5em;
    color: var(--accent);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 300;
    font-style: italic;
    color: var(--accent);
    margin-top: 3rem;
    margin-bottom: 1rem;
  }

  .tagline {
    font-size: 1.1rem;
    color: var(--light-gray);
    line-height: 1.6;
    margin-bottom: 2.5rem;
  }

  .status {
    display: inline-block;
    padding: 0.6rem 1.5rem;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  .contact {
    margin-top: 3rem;
    font-size: 0.9rem;
    color: var(--gray);
  }
  .contact a {
    color: var(--white);
    text-decoration: none;
    transition: color 0.3s;
  }
  .contact a:hover {
    color: var(--accent);
  }

  .divider {
    width: 60px;
    height: 1px;
    background: var(--accent);
    margin: 2rem auto;
  }

  @media (max-width: 768px) {
    .logo { font-size: 3rem; }
    h1 { font-size: 2rem; }
    .container { padding: 1.5rem; }
  }
</style>
</head>
<body>
  <div class="geo-bg">
    <svg viewBox="0 0 100 100" preserveAspectRatio="none">
      <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
        <path d="M 10 0 L 0 0 0 10" fill="none" stroke="currentColor" stroke-width="0.5"/>
      </pattern>
      <rect width="100%" height="100%" fill="url(#grid)"/>
    </svg>
  </div>

  <div class="container">
    <div class="logo">
      COOLLOOKS
      <span>BARBERZ</span>
    </div>

    <div class="divider"></div>

    <h1>Coming Soon</h1>

    <p class="tagline">
      We're putting the finishing touches on something special.<br>
      Premium cuts, fades & styling — launching soon in Slacks Creek.
    </p>

    <div class="status">Under Construction</div>

    <div class="contact">
      <p>In the meantime, call us to book:</p>
      <p style="margin-top: 0.5rem;">
        <a href="tel:+61470224498">+61 470 224 498</a>
      </p>
    </div>
  </div>
</body>
</html>
