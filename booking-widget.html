<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now - Coollooks23</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; }
        .booking-widget { max-width: 500px; margin: 0 auto; padding: 24px; background: #0a0a0a; border: 1px solid #D4AF37; border-radius: 0; }
        .widget-header { text-align: center; margin-bottom: 24px; }
        .widget-header h2 { color: #D4AF37; font-size: 24px; font-style: italic; margin-bottom: 8px; }
        .widget-header p { color: #888; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; color: #fff; font-weight: 500; font-size: 14px; }
        .form-group input, .form-group select, input[type=date] { width: 100%; padding: 12px; border: 1px solid #333; background: #000; color: #fff; font-size: 14px; border-radius: 0; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #D4AF37; }
        input[type=date] { appearance: none; -webkit-appearance: none; }
        input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; cursor: pointer; }
        .service-option { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid #333; background: #000; margin-bottom: 8px; cursor: pointer; transition: all 0.3s; border-radius: 0; }
        .service-option:hover { border-color: #D4AF37; }
        .service-option.selected { border-color: #D4AF37; background: #1a1a1a; }
        .service-name { font-weight: 500; color: #fff; }
        .service-details { color: #888; font-size: 13px; }
        .service-price { color: #D4AF37; font-weight: 600; }
        .date-time-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .calendar-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .calendar-nav button { background: none; border: 1px solid #333; padding: 6px 12px; cursor: pointer; font-size: 16px; color: #fff; transition: border-color 0.2s; border-radius: 0; }
        .calendar-nav button:hover:not(:disabled) { border-color: #D4AF37; color: #D4AF37; }
        .calendar-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
        .calendar-range { font-size: 14px; font-weight: 500; color: #fff; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
        .calendar-day-label { text-align: center; font-size: 11px; color: #888; padding: 4px 0; font-weight: 500; }
        .calendar-day { text-align: center; padding: 8px 4px; border: 1px solid #333; cursor: pointer; font-size: 13px; transition: all 0.2s; color: #fff; background: #000; }
        .calendar-day:hover:not(.disabled) { border-color: #D4AF37; background: #1a1a1a; }
        .calendar-day.selected { background: #D4AF37; color: #000; border-color: #D4AF37; }
        .calendar-day.today { border-color: #D4AF37; font-weight: 700; }
        .calendar-day.disabled { color: #444; cursor: not-allowed; background: #0a0a0a; }
        .submit-btn { width: 100%; padding: 14px; background: #fff; color: #000; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; border-radius: 0; }
        .submit-btn:hover { background: #D4AF37; }
        .submit-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        .success-message { text-align: center; padding: 40px 20px; }
        .success-icon { width: 60px; height: 60px; background: #D4AF37; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: #000; font-size: 30px; }
        .error-message { color: #ff4444; font-size: 14px; margin-top: 8px; }
        .subscription-note { background: #1a1a1a; padding: 12px; border-left: 3px solid #D4AF37; margin-bottom: 16px; font-size: 13px; color: #888; }
        .close-btn { position: absolute; top: 10px; right: 15px; color: #fff; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="booking-widget" id="bookingWidget">
        <div class="widget-header">
            <h2>Book Appointment</h2>
            <p>Coollooks23 Barberz</p>
        </div>
        
        <div class="subscription-note">
            💎 <strong>Subscribe $70/month</strong> for unlimited bookings!
        </div>
        
        <form id="bookingForm">
            <!-- Service Selection -->
            <div class="form-group">
                <label>Select Service</label>
                <div id="servicesList"></div>
                <input type="hidden" id="selectedService" required>
                <div class="error-message" id="serviceError"></div>
            </div>
            
            <!-- Personal Details -->
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="customerName" placeholder="John Smith" required>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="customerEmail" placeholder="john@example.com" required>
            </div>
            
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="customerPhone" placeholder="+61 400 000 000" required>
            </div>
            
            <!-- Date & Time -->
            <div class="form-group">
                <label>Date</label>
                <div class="calendar-nav">
                    <button type="button" id="prevWeeks">&#8249;</button>
                    <span class="calendar-range" id="calendarRange"></span>
                    <button type="button" id="nextWeeks">&#8250;</button>
                </div>
                <div class="calendar-grid" id="calendarDayLabels"></div>
                <div class="calendar-grid" id="calendarWeek1"></div>
                <div class="calendar-grid" id="calendarWeek2"></div>
                <input type="hidden" id="bookingDate" required>
                <div class="error-message" id="dateError"></div>
            </div>
            <div class="form-group">
                <label>Time</label>
                <select id="bookingTime" required>
                    <option value="">Select time</option>
                </select>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">BOOK NOW</button>
        </form>
        
        <div class="success-message" id="successMessage" style="display: none;">
            <div class="success-icon">✓</div>
            <h3>Booking Confirmed!</h3>
            <p style="margin-top: 12px; color: #666;">We've sent a confirmation to your email.</p>
            <p style="margin-top: 8px; color: #666;">Subscribe for $70/month for unlimited bookings!</p>
        </div>
    </div>

    <script>
        // CONFIG: Change this to your PocketBase URL
        const POCKETBASE_URL = 'http://170.64.153.193:8090';
        let SERVICES = [];
        
        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await loadServices();
            renderServices();
            setupDatePicker();
            setupForm();
        });
        
        async function loadServices() {
            try {
                const res = await fetch(`${POCKETBASE_URL}/api/collections/services/records`);
                const data = await res.json();
                SERVICES = data.items.map(s => ({
                    id: s.id,
                    name: s.name,
                    duration: s.duration,
                    price: s.price
                }));
            } catch (e) {
                console.error('Failed to load services:', e);
            }
        }
        
        function renderServices() {
            const container = document.getElementById('servicesList');
            container.innerHTML = SERVICES.map(s => `
                <div class="service-option" data-id="${s.id}" onclick="selectService(${s.id})">
                    <div>
                        <div class="service-name">${s.name}</div>
                        <div class="service-details">${s.duration} min</div>
                    </div>
                    <div class="service-price">$${s.price}</div>
                </div>
            `).join('');
        }
        
        function selectService(id) {
            document.querySelectorAll('.service-option').forEach(el => el.classList.remove('selected'));
            document.querySelector(`[data-id="${id}"]`).classList.add('selected');
            document.getElementById('selectedService').value = id;
            document.getElementById('serviceError').textContent = '';
            updateTimeSlots();
        }
        
        let calendarStart = null;

        function toDateStr(d) {
            return d.toISOString().split('T')[0];
        }

        function getMonday(d) {
            const day = d.getDay();
            const diff = (day === 0 ? -6 : 1 - day);
            const mon = new Date(d);
            mon.setDate(d.getDate() + diff);
            mon.setHours(0, 0, 0, 0);
            return mon;
        }

        function setupDatePicker() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            calendarStart = getMonday(today);

            const DAY_LABELS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const labelsEl = document.getElementById('calendarDayLabels');
            labelsEl.innerHTML = DAY_LABELS.map(d => `<div class="calendar-day-label">${d}</div>`).join('');

            document.getElementById('prevWeeks').addEventListener('click', () => {
                calendarStart = new Date(calendarStart);
                calendarStart.setDate(calendarStart.getDate() - 14);
                renderCalendar();
            });
            document.getElementById('nextWeeks').addEventListener('click', () => {
                calendarStart = new Date(calendarStart);
                calendarStart.setDate(calendarStart.getDate() + 14);
                renderCalendar();
            });

            renderCalendar();
        }

        function renderCalendar() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const maxDate = new Date(today);
            maxDate.setMonth(maxDate.getMonth() + 2);

            const endDate = new Date(calendarStart);
            endDate.setDate(calendarStart.getDate() + 13);
            const fmt = { month: 'short', day: 'numeric' };
            const startLabel = calendarStart.toLocaleDateString('en-AU', fmt);
            const endLabel = endDate.toLocaleDateString('en-AU', { ...fmt, year: 'numeric' });
            document.getElementById('calendarRange').textContent = `${startLabel} – ${endLabel}`;

            const prevStart = new Date(calendarStart);
            prevStart.setDate(calendarStart.getDate() - 14);
            const prevEnd = new Date(prevStart);
            prevEnd.setDate(prevStart.getDate() + 13);
            document.getElementById('prevWeeks').disabled = prevEnd < today;

            const nextStart = new Date(calendarStart);
            nextStart.setDate(calendarStart.getDate() + 14);
            document.getElementById('nextWeeks').disabled = nextStart > maxDate;

            const selectedDate = document.getElementById('bookingDate').value;
            ['calendarWeek1', 'calendarWeek2'].forEach((id, weekIdx) => {
                const el = document.getElementById(id);
                let html = '';
                for (let i = 0; i < 7; i++) {
                    const d = new Date(calendarStart);
                    d.setDate(calendarStart.getDate() + weekIdx * 7 + i);
                    const dStr = toDateStr(d);
                    const isDisabled = d < today || d > maxDate;
                    const isSelected = dStr === selectedDate;
                    const isToday = dStr === toDateStr(today);
                    let cls = 'calendar-day';
                    if (isDisabled) cls += ' disabled';
                    else if (isSelected) cls += ' selected';
                    else if (isToday) cls += ' today';
                    const clickHandler = isDisabled ? '' : `onclick="selectDate('${dStr}')"`;
                    html += `<div class="${cls}" ${clickHandler}>${d.getDate()}</div>`;
                }
                el.innerHTML = html;
            });
        }

        function selectDate(dateStr) {
            document.getElementById('bookingDate').value = dateStr;
            document.getElementById('dateError').textContent = '';
            renderCalendar();
            updateTimeSlots();
        }
        
        function updateTimeSlots() {
            const select = document.getElementById('bookingTime');
            const slots = [];
            for (let hour = 8; hour < 18; hour++) {
                slots.push(`${hour.toString().padStart(2, '0')}:00`);
                slots.push(`${hour.toString().padStart(2, '0')}:30`);
            }
            select.innerHTML = '<option value="">Select time</option>' + 
                slots.map(t => `<option value="${t}">${t}</option>`).join('');
        }
        
        async function submitBooking(bookingData) {
            // Guest booking - create booking directly with customer info (no account required)
            const bookingResponse = await fetch(`${POCKETBASE_URL}/api/collections/bookings/records`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: 'guest_' + Date.now(),
                    user_name: bookingData.name,
                    user_email: bookingData.email,
                    user_phone: bookingData.phone,
                    service_id: bookingData.service_id,
                    service_name: bookingData.service_name,
                    date_time: bookingData.date_time,
                    status: 'pending'
                })
            });
            
            if (!bookingResponse.ok) throw new Error('Failed to create booking');
            
            const booking = await bookingResponse.json();
            return booking;
        }
        
        function setupForm() {
            document.getElementById('bookingForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                btn.textContent = 'Booking...';
                
                const serviceId = document.getElementById('selectedService').value;
                if (!serviceId) {
                    document.getElementById('serviceError').textContent = 'Please select a service';
                    btn.disabled = false;
                    btn.textContent = 'Book Now';
                    return;
                }
                
                const service = SERVICES.find(s => s.id === parseInt(serviceId));
                const date = document.getElementById('bookingDate').value;
                if (!date) {
                    document.getElementById('dateError').textContent = 'Please select a date';
                    btn.disabled = false;
                    btn.textContent = 'BOOK NOW';
                    return;
                }
                const time = document.getElementById('bookingTime').value;
                
                const bookingData = {
                    name: document.getElementById('customerName').value,
                    email: document.getElementById('customerEmail').value,
                    phone: document.getElementById('customerPhone').value,
                    service_id: serviceId,
                    service_name: service.name,
                    service_price: service.price,
                    date_time: `${date}T${time}:00`
                };
                
                try {
                    await submitBooking(bookingData);
                    
                    document.getElementById('bookingForm').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                    
                } catch (error) {
                    console.error(error);
                    document.getElementById('serviceError').textContent = 'Booking failed. Please try again.';
                    btn.disabled = false;
                    btn.textContent = 'Book Now';
                }
            });
        }
    </script>
</body>
</html>
