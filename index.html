<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coollooks23 - Book Your Appointment</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 40px; }
        h1 { color: #C9A84C; font-size: 48px; margin-bottom: 10px; }
        p { color: #999; font-size: 18px; margin-bottom: 40px; }
        .links { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .link-card { background: white; padding: 30px 40px; border-radius: 16px; text-decoration: none; color: #333; transition: transform 0.3s, box-shadow 0.3s; display: block; }
        .link-card:hover { transform: translateY(-5px); box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .link-card h2 { font-size: 24px; margin-bottom: 10px; }
        .link-card p { color: #666; font-size: 14px; margin: 0; }
        .booking { background: #C9A84C; }
        .booking h2 { color: white; }
        .admin { background: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Coollooks23</h1>
        <p>Barberz & Hair Styling</p>
        
        <div class="links">
            <a href="booking-widget.html" class="link-card booking">
                <h2>📅 Book Now</h2>
                <p>Schedule your appointment</p>
            </a>
            
            <a href="admin.html" class="link-card admin">
                <h2>⚙️ Admin</h2>
                <p>Manage bookings</p>
            </a>
        </div>
    </div>
</body>
</html>
